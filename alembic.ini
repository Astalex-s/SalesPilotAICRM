# Alembic configuration file
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts
script_location = alembic

# Add current directory to sys.path so `src.*` imports work
prepend_sys_path = .

# Template for new revision filenames
file_template = %%(rev)s_%%(slug)s

# Separator used between version numbers in version_path
version_path_separator = os

# SQLAlchemy URL — overridden in env.py from settings.DATABASE_URL
# Leave as placeholder; env.py calls config.set_main_option() at runtime.
sqlalchemy.url = postgresql+asyncpg://placeholder/placeholder

[post_write_hooks]
# No post-write hooks configured.

# ── Logging ─────────────────────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
