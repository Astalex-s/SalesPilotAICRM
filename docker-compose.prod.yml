# ── Production Docker Compose ──────────────────────────────────────────────────
# Usage:
#   cp .env.example .env          # fill in real secrets
#   docker compose -f docker-compose.prod.yml up -d --build
#
# All services communicate over the internal bridge network.
# Only nginx is exposed to the host.

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-salespilot}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-salespilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD:-}"
      --maxmemory    "${REDIS_MAX_MEMORY:-256mb}"
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Backend (FastAPI + Gunicorn + UvicornWorker) ──────────────────────────────
  backend:
    # image: set BACKEND_IMAGE env var to use a pre-built GHCR image.
    # Falls back to local build name when not set (used during local `--build`).
    image: ${BACKEND_IMAGE:-salespilotaicrm-backend:latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: always
    env_file: .env
    environment:
      DEBUG: "false"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/docs > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - internal

  # ── Celery Worker ─────────────────────────────────────────────────────────────
  celery_worker:
    image: ${BACKEND_IMAGE:-salespilotaicrm-backend:latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: always
    volumes:
      - uploads_data:/app/uploads
    command:
      - celery
      - -A
      - src.infrastructure.celery.celery_app
      - worker
      - --loglevel=info
      - --concurrency=${CELERY_CONCURRENCY:-2}
    env_file: .env
    environment:
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ── Celery Beat (periodic task scheduler) ────────────────────────────────────
  celery_beat:
    image: ${BACKEND_IMAGE:-salespilotaicrm-backend:latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: always
    volumes:
      - uploads_data:/app/uploads
    command:
      - celery
      - -A
      - src.infrastructure.celery.celery_app
      - beat
      - --loglevel=info
      - --scheduler=celery.beat.PersistentScheduler
      - --schedule=/tmp/celerybeat-schedule
    env_file: .env
    environment:
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ── Frontend (built static served by nginx) ───────────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-salespilotaicrm-frontend:latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: always
    networks:
      - internal

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    restart: always
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    restart: always
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_AUTH_ANONYMOUS_ENABLED:  "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SERVER_ROOT_URL:         "https://zaprix.ru/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - internal

  # ── Nginx (public gateway) ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - internal

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  uploads_data:
  prometheus_data:
  grafana_data:
  certbot_webroot:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
