# ── Production Docker Compose ──────────────────────────────────────────────────
# Usage:
#   cp .env.example .env          # fill in real secrets
#   docker compose -f docker-compose.prod.yml up -d --build
#
# All services communicate over the internal bridge network.
# Only nginx is exposed to the host.

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-salespilot}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-salespilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD:-}"
      --maxmemory    "${REDIS_MAX_MEMORY:-256mb}"
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Backend (FastAPI + Gunicorn + UvicornWorker) ──────────────────────────────
  backend:
    # image: set BACKEND_IMAGE env var to use a pre-built GHCR image.
    # Falls back to local build name when not set (used during local `--build`).
    image: ${BACKEND_IMAGE:-salespilotaicrm-backend:latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: always
    env_file: .env
    environment:
      DEBUG: "false"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/docs > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - internal

  # ── Celery Worker ─────────────────────────────────────────────────────────────
  celery_worker:
    image: ${BACKEND_IMAGE:-salespilotaicrm-backend:latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: always
    volumes:
      - uploads_data:/app/uploads
    command:
      - celery
      - -A
      - src.infrastructure.celery.celery_app
      - worker
      - --loglevel=info
      - --concurrency=${CELERY_CONCURRENCY:-2}
    env_file: .env
    environment:
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ── Celery Beat (periodic task scheduler) ────────────────────────────────────
  celery_beat:
    image: ${BACKEND_IMAGE:-salespilotaicrm-backend:latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: always
    volumes:
      - uploads_data:/app/uploads
    command:
      - celery
      - -A
      - src.infrastructure.celery.celery_app
      - beat
      - --loglevel=info
      - --scheduler=celery.beat.PersistentScheduler
      - --schedule=/tmp/celerybeat-schedule
    env_file: .env
    environment:
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ── Frontend (built static served by nginx) ───────────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-salespilotaicrm-frontend:latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: always
    networks:
      - internal

  # ── Nginx (public gateway) ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - internal

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  uploads_data:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
