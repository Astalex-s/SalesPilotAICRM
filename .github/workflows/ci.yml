name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Backend: lint + unit + integration tests ───────────────────────────────
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install aiosqlite pytest-cov

      - name: Run tests
        env:
          # Settings validator requires postgresql+asyncpg:// prefix.
          # Unit tests mock all repos; integration tests use SQLite in-memory.
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/salespilot
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          SECRET_KEY: ci-test-secret-key-not-for-production
          OPENAI_API_KEY: sk-test-placeholder
          TELEGRAM_BOT_TOKEN: ""
          GMAIL_CLIENT_ID: ""
          GMAIL_CLIENT_SECRET: ""
        run: |
          pytest tests/ \
            --ignore=tests/integration \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            -q

      - name: Run integration tests (SQLite in-memory)
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/salespilot
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          SECRET_KEY: ci-test-secret-key-not-for-production
          OPENAI_API_KEY: sk-test-placeholder
          TELEGRAM_BOT_TOKEN: ""
          GMAIL_CLIENT_ID: ""
          GMAIL_CLIENT_SECRET: ""
        run: |
          pytest tests/integration \
            --tb=short \
            -q

  # ── Frontend: type-check + unit tests ─────────────────────────────────────
  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check + build
        run: npm run build

      - name: Unit tests
        run: npm run test
