# ── Upstream definitions ───────────────────────────────────────────────────────
upstream backend {
    server backend:8000;
    keepalive 64;
}

upstream frontend {
    server frontend:80;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name zaprix.ru www.zaprix.ru;

    # Let's Encrypt renewal challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server block ───────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name zaprix.ru www.zaprix.ru;

    # ── SSL certificates ─────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/zaprix.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zaprix.ru/privkey.pem;

    # ── SSL hardening ────────────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # ── HSTS ─────────────────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 20m;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
    gzip_min_length 1024;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                         always;
    add_header X-Content-Type-Options   "nosniff"                            always;
    add_header X-XSS-Protection         "1; mode=block"                      always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"    always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # ── Backend: API + docs + openapi ────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout    120s;

        # Disable buffering for SSE / streaming responses
        proxy_buffering       off;
    }

    # ── Frontend SPA ─────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
